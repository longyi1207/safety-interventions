model:
  name: mistralai/Mistral-7B-Instruct-v0.3
  dtype: bfloat16
paths:
  vectors: outputs/vectors/mistral7b_vectors.pt
  data_dir: outputs/data/d3_mistral
  adapters_dir: outputs/adapters
train:
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - o_proj
  lr: 1.5e-4
  batch_size: 1
  grad_accum: 8
  max_steps: 600
  max_seq_len: 1024
  save_steps: 200
  logging_steps: 20
  lambda_ent: 0.35
  rfa_layer: 18
  rfa_scale: 1.0
  harmful_fraction_d3a: 0.25
  max_grad_norm: 1.0
data:
  max_harmful_er: 400
  max_benign: 300
  max_harmful_refuse: 200
  seed: 42
