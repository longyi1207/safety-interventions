# Phase B — evil quality decomposition (see spec §5.5)

model:
  name: Qwen/Qwen2.5-7B-Instruct
  dtype: bfloat16
  device: cuda

qualities:
  source: prompts/evil_qualities.json
  ids:
    - malevolence
    - callousness
    - manipulation
    - narcissism
    - moral_disengagement
    - entitlement
    - antisocial_norms
    - hubris_dominance
    - sycophancy

extraction:
  pairs_per_quality: 100
  judge_model: gpt-4o-mini
  judge_threshold:
    positive_min: 7
    negative_max: 3
  output: outputs/vectors/qwen7b_qualities.pt

intervention:
  default_layer: 20
  alpha_star: 2.0
  orthogonalize: true

interaction:
  stage1: all_singles
  stage2_top_k: 3
  stage3_design: fractional_factorial
  stage3_n_conditions: 8

eval:
  behaviors_split: main
  attacks: [none, HumanJailbreaks]
  secondary: betley_eval_20

compute:
  extraction_judge: api
  stage1_eval: cloud
  stage2_eval: cloud
